name: Deploy Frontend with Compose
on:
  push:
    branches: [ "deploy" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_FRONT_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
                # 1. Asegurar permisos del socket de Docker
                sudo chmod 666 /var/run/docker.sock
                
                # 2. LIMPIEZA CRÍTICA: Eliminar el contenedor viejo si existe
                # Esto evita el error "Conflict. The container name is already in use"
                docker stop front-container || true
                docker rm front-container || true
                
                # 3. Limpiar carpeta y clonar la rama deploy (Cumpliendo IE4)
                sudo rm -rf Front_Eval2
                git clone -b deploy https://github.com/ignaciokort/Front_Eval2.git
                cd Front_Eval2
                
                # 4. Configurar variables de entorno para Flask
                echo "BACKEND_URL=${{ secrets.BACKEND_URL }}" > .env
                
                # 5. Desplegar usando Docker Compose (Cumpliendo IE2)
                # Usamos 'docker compose' sin guion para mayor compatibilidad
                docker compose down
                docker compose up -d --build
