deploy.name: Deploy Front
on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_FRONT_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            sudo chmod 666 /var/run/docker.sock
            sudo rm -rf Front_Eval2
            git clone https://github.com/ignaciokort/Front_Eval2.git
            cd Front_Eval2
            docker build -t front-app .
            docker stop front-container || true
            docker rm front-container || true
            docker run -d --name front-container -p 5000:5000 -e PORT=5000 -e BACKEND_URL=${{ secrets.BACKEND_URL }} front-app
